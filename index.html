<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CareerTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;font-family:'DM Sans',sans-serif;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0a0a14}
::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:3px}
select option{background:#13131f;color:#e2e8f0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

/* ── Constants ── */
const PIPELINE=["Applied","HR Interview","1st Round","2nd Round","Offer"];
const STAGE_CLR={"Applied":"#6366f1","HR Interview":"#8b5cf6","1st Round":"#06b6d4","2nd Round":"#10b981","Offer":"#f59e0b"};
const ITYPES=["Phone Screen","Video Call","Technical","Case Study","Behavioural","Panel","Take-Home","On-site","Other"];
const STATUSES=["Active","Rejected","Withdrawn","Offer Accepted","Offer Declined"];
const STATUS_CLR={"Active":"#6366f1","Rejected":"#f43f5e","Withdrawn":"#94a3b8","Offer Accepted":"#f59e0b","Offer Declined":"#64748b"};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const YEARS=["2024","2025","2026","2027"];
const BLANK_APP={company:"",role:"",month:"",year:"2026",stage:"Applied",status:"Active",interviewTypes:[],notes:"",salaryRange:"",totalCompNotes:"",stageDates:{},history:[],jdText:"",jdAnalysis:null,resumeText:"",coverLetterText:"",portfolioText:"",resumeName:"",coverLetterName:"",portfolioName:"",workSamples:""};

/* ── Local storage (API key only) ── */
function getApiKey(){return localStorage.getItem("ct_apikey")||"";}
function saveApiKey(k){localStorage.setItem("ct_apikey",k.trim());}
function getSupaConfig(){try{return JSON.parse(localStorage.getItem("ct_supa")||"null");}catch{return null;}}
function saveSupaConfig(cfg){localStorage.setItem("ct_supa",JSON.stringify(cfg));}

/* ── Supabase client ── */
let _supa=null;
function getSupa(){return _supa;}
function initSupa(url,key){
  _supa=supabase.createClient(url,key);
  return _supa;
}

/* ── Claude API ── */
async function callClaude(messages,system,onChunk){
  const apiKey=getApiKey();
  if(!apiKey) throw new Error("No API key set");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,system,messages,stream:!!onChunk})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`API error ${res.status}`);}
  if(onChunk){
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split("\n").filter(l=>l.startsWith("data:"))){
        try{const j=JSON.parse(line.slice(5));if(j.delta?.text){full+=j.delta.text;onChunk(full);}}catch{}
      }
    }
    return full;
  }
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"";
}

/* ══════════════════════════════════════════════════════
   UI PRIMITIVES
══════════════════════════════════════════════════════ */
const si={width:"100%",boxSizing:"border-box",background:"#0d0d1a",border:"1px solid #2a2a3d",borderRadius:"8px",color:"#e2e8f0",padding:"9px 13px",fontSize:"14px",outline:"none",fontFamily:"inherit"};
function Lbl({c}){return <label style={{display:"block",fontSize:"11px",color:"#94a3b8",marginBottom:"5px",letterSpacing:"0.08em",textTransform:"uppercase"}}>{c}</label>;}
function Inp({label,type="text",value,onChange,placeholder,readOnly,pw}){
  return(<div style={{marginBottom:"14px"}}>{label&&<Lbl c={label}/>}<input type={pw?"password":type} value={value||""} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} style={{...si,background:readOnly?"#0a0a14":"#0d0d1a"}}/></div>);
}
function TA({label,value,onChange,placeholder,rows=3}){
  return(<div style={{marginBottom:"14px"}}>{label&&<Lbl c={label}/>}<textarea value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...si,resize:"vertical"}}/></div>);
}
function Sel({label,value,onChange,options}){
  return(<div style={{marginBottom:"14px"}}>{label&&<Lbl c={label}/>}<select value={value||""} onChange={e=>onChange(e.target.value)} style={si}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>);
}
function PBtn({onClick,children,small,danger,disabled,full}){
  return(<button onClick={onClick} disabled={disabled} style={{background:danger?"linear-gradient(135deg,#f43f5e,#e11d48)":"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:"8px",padding:small?"7px 14px":"10px 22px",fontSize:small?"12px":"14px",fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.6:1,width:full?"100%":"auto",boxShadow:danger?"0 4px 16px rgba(244,63,94,0.3)":"0 4px 20px rgba(99,102,241,0.4)"}}>{children}</button>);
}
function GBtn({onClick,children,small}){
  return(<button onClick={onClick} style={{background:"none",border:"1px solid #2a2a3d",color:"#64748b",borderRadius:"8px",padding:small?"7px 14px":"9px 18px",fontSize:small?"12px":"14px",cursor:"pointer",fontFamily:"inherit"}}>{children}</button>);
}
function Pill({children,color="#6366f1"}){
  return(<span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"6px",padding:"2px 9px",fontSize:"11px",fontWeight:600}}>{children}</span>);
}
function Spinner({small}){
  const sz=small?"11px":"13px";
  return(<span style={{display:"inline-block",width:sz,height:sz,border:"2px solid #6366f144",borderTopColor:"#6366f1",borderRadius:"50%",animation:"spin 0.7s linear infinite",verticalAlign:"middle",marginRight:"6px"}}/>);
}
function SHead({children}){return(<div style={{fontSize:"11px",color:"#4a4a6a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"10px",marginTop:"8px",borderBottom:"1px solid #1a1a2e",paddingBottom:"6px"}}>{children}</div>);}
function TabBar({tabs,active,onSelect,small}){
  return(<div style={{display:"flex",gap:"2px",borderBottom:"1px solid #1a1a2e",marginBottom:small?"16px":"24px"}}>{tabs.map(t=><button key={t} onClick={()=>onSelect(t)} style={{background:"none",border:"none",color:active===t?"#a5b4fc":"#4a4a6a",fontFamily:"inherit",fontSize:small?"12px":"14px",fontWeight:600,padding:small?"7px 12px":"10px 20px",cursor:"pointer",borderBottom:active===t?"2px solid #6366f1":"2px solid transparent"}}>{t}</button>)}</div>);
}
function Modal({title,onClose,children,wide,xl}){
  const w=xl?"920px":wide?"700px":"520px";
  return(<div style={{position:"fixed",inset:0,background:"rgba(10,10,20,0.88)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",backdropFilter:"blur(6px)",overflowY:"auto",padding:"28px 16px"}}>
    <div className="fade-in" style={{background:"#13131f",border:"1px solid #2a2a3d",borderRadius:"16px",padding:"28px",width:w,maxWidth:"96vw",boxShadow:"0 24px 80px rgba(0,0,0,0.7)",margin:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
        <h2 style={{margin:0,fontSize:"17px",color:"#e2e8f0",fontFamily:"'Playfair Display',serif"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:"24px",cursor:"pointer",lineHeight:1}}>×</button>
      </div>
      {children}
    </div>
  </div>);
}
function Card({children,style}){
  return(<div style={{background:"#0f0f1e",border:"1px solid #1a1a2e",borderRadius:"12px",padding:"20px",...style}}>{children}</div>);
}
function ErrBox({msg}){
  if(!msg) return null;
  return(<div style={{color:"#f43f5e",fontSize:"13px",background:"#f43f5e11",border:"1px solid #f43f5e33",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px"}}>⚠️ {msg}</div>);
}

/* ── Pipeline Bar ── */
function PipeBar({stage,onClick}){
  const idx=PIPELINE.indexOf(stage)||0;
  return(<div style={{display:"flex",alignItems:"center",margin:"10px 0 4px"}}>{PIPELINE.map((s,i)=>{
    const done=i<=idx,cur=i===idx;
    return(<div key={s} style={{display:"flex",alignItems:"center",flex:1}}>
      <div style={{flex:1,height:"4px",background:i===0?"transparent":(i<=idx?STAGE_CLR[PIPELINE[i-1]]:"#1e1e30")}}/>
      <div onClick={()=>onClick&&onClick(s)} title={s} style={{width:cur?"14px":"10px",height:cur?"14px":"10px",borderRadius:"50%",background:done?STAGE_CLR[s]:"#1e1e30",flexShrink:0,border:cur?`2px solid ${STAGE_CLR[s]}`:"none",boxShadow:cur?`0 0 8px ${STAGE_CLR[s]}88`:"none",cursor:onClick?"pointer":"default",transition:"all 0.2s"}}/>
      <div style={{flex:1,height:"4px",background:i<idx?STAGE_CLR[s]:"#1e1e30"}}/>
    </div>);
  })}</div>);
}

/* ── Interview chips ── */
function IChips({selected,onChange}){
  return(<div style={{marginBottom:"14px"}}><Lbl c="Interview Types"/><div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{ITYPES.map(t=>{const on=selected.includes(t);return(<button key={t} onClick={()=>onChange(on?selected.filter(x=>x!==t):[...selected,t])} style={{background:on?"#6366f122":"#0d0d1a",color:on?"#a5b4fc":"#4a4a6a",border:on?"1px solid #6366f155":"1px solid #2a2a3d",borderRadius:"6px",padding:"4px 10px",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>{t}</button>);})}</div></div>);
}

/* ── File upload ── */
function FileUp({label,fileName,onFile,onClear}){
  const ref=useRef();
  function handle(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>onFile(file.name,ev.target.result);r.readAsText(file);}
  return(<div style={{marginBottom:"14px"}}><Lbl c={label}/>{fileName?(<div style={{display:"flex",alignItems:"center",gap:"10px",...si}}><span style={{fontSize:"13px",color:"#a5b4fc",flex:1}}>📄 {fileName}</span><button onClick={onClear} style={{background:"none",border:"none",color:"#f43f5e",cursor:"pointer",fontSize:"18px",lineHeight:1}}>×</button></div>):(<div onClick={()=>ref.current.click()} style={{...si,border:"1px dashed #2a2a3d",textAlign:"center",cursor:"pointer",color:"#4a4a6a",fontSize:"13px",padding:"14px"}}><input ref={ref} type="file" accept=".pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={handle}/>Click to upload</div>)}</div>);
}

/* ── Month picker ── */
function MonthPicker({month,year,onChange}){
  return(<div style={{marginBottom:"14px"}}><Lbl c="Month Applied"/><div style={{display:"flex",gap:"8px"}}>
    <select value={month||""} onChange={e=>onChange({month:e.target.value,year})} style={{...si,flex:2}}><option value="">Month</option>{MONTHS.map(m=><option key={m} value={m}>{m}</option>)}</select>
    <select value={year||"2026"} onChange={e=>onChange({month,year:e.target.value})} style={{...si,flex:1}}>{YEARS.map(y=><option key={y} value={y}>{y}</option>)}</select>
  </div></div>);
}

/* ══════════════════════════════════════════════════════
   SETUP SCREEN (Supabase + API Key)
══════════════════════════════════════════════════════ */
function SetupScreen({onDone}){
  const [step,setStep]=useState(1);
  const [url,setUrl]=useState("");
  const [anonKey,setAnonKey]=useState("");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [apiKey,setApiKey]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [isSignup,setIsSignup]=useState(true);

  async function connectSupabase(){
    if(!url.trim()||!anonKey.trim()){setErr("Please enter both the Project URL and anon key.");return;}
    setLoading(true);setErr("");
    try{
      const client=initSupa(url.trim(),anonKey.trim());
      const{error}=await client.from("applications").select("id").limit(1);
      if(error&&error.code!=="PGRST116"&&!error.message.includes("does not exist")){
        throw new Error(error.message);
      }
      saveSupaConfig({url:url.trim(),anonKey:anonKey.trim()});
      setStep(2);
    }catch(e){setErr("Could not connect to Supabase: "+e.message);}
    setLoading(false);
  }

  async function authUser(){
    if(!email.trim()||!password.trim()){setErr("Please enter email and password.");return;}
    setLoading(true);setErr("");
    const supa=getSupa();
    try{
      let result;
      if(isSignup){
        result=await supa.auth.signUp({email:email.trim(),password:password.trim()});
      } else {
        result=await supa.auth.signInWithPassword({email:email.trim(),password:password.trim()});
      }
      if(result.error) throw new Error(result.error.message);
      setStep(3);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  async function saveApiKeyStep(){
    if(!apiKey.trim().startsWith("sk-ant-")){setErr("Your key should start with sk-ant-");return;}
    setLoading(true);setErr("");
    saveApiKey(apiKey.trim());
    try{
      await callClaude([{role:"user",content:"Say: ready"}],"Reply with only the word: ready");
      onDone();
    }catch(e){
      localStorage.removeItem("ct_apikey");
      setErr("API key error: "+e.message);
    }
    setLoading(false);
  }

  const box={background:"#13131f",border:"1px solid #2a2a3d",borderRadius:"20px",padding:"44px",maxWidth:"480px",width:"100%",boxShadow:"0 24px 80px rgba(0,0,0,0.6)"};

  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"#0a0a14"}}>
    <div style={box}>
      <div style={{textAlign:"center",marginBottom:"28px"}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",background:"linear-gradient(135deg,#a5b4fc,#818cf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 6px"}}>CareerTrack</h1>
        <div style={{display:"flex",justifyContent:"center",gap:"8px",marginTop:"12px"}}>
          {[1,2,3].map(n=><div key={n} style={{width:"28px",height:"4px",borderRadius:"2px",background:step>=n?"#6366f1":"#1a1a2e"}}/>)}
        </div>
      </div>

      {step===1&&(<div>
        <div style={{fontSize:"15px",color:"#c7d2fe",fontWeight:600,marginBottom:"6px"}}>Step 1 of 3 — Connect your database</div>
        <p style={{fontSize:"13px",color:"#4a4a6a",marginBottom:"20px",lineHeight:1.7}}>This stores your data in the cloud so it syncs across all your devices.</p>
        <div style={{background:"#0a0a14",borderRadius:"10px",padding:"16px",marginBottom:"20px",fontSize:"13px",color:"#64748b",lineHeight:1.8}}>
          <div style={{fontWeight:700,color:"#94a3b8",marginBottom:"6px"}}>Get your Supabase details:</div>
          <div>1. Go to <strong style={{color:"#a5b4fc"}}>supabase.com</strong> → your project</div>
          <div>2. Click <strong style={{color:"#a5b4fc"}}>Settings → API</strong></div>
          <div>3. Copy <strong style={{color:"#a5b4fc"}}>Project URL</strong> and <strong style={{color:"#a5b4fc"}}>anon public</strong> key</div>
        </div>
        <Inp label="Project URL" value={url} onChange={setUrl} placeholder="https://xxxx.supabase.co"/>
        <Inp label="Anon Public Key" value={anonKey} onChange={setAnonKey} placeholder="eyJ..." pw/>
        <ErrBox msg={err}/>
        <PBtn onClick={connectSupabase} disabled={loading} full>{loading?<><Spinner/>Connecting…</>:"Connect Database →"}</PBtn>
      </div>)}

      {step===2&&(<div>
        <div style={{fontSize:"15px",color:"#c7d2fe",fontWeight:600,marginBottom:"6px"}}>Step 2 of 3 — {isSignup?"Create your account":"Sign in"}</div>
        <p style={{fontSize:"13px",color:"#4a4a6a",marginBottom:"20px",lineHeight:1.7}}>Your account keeps your data private and accessible from any device.</p>
        <Inp label="Email" value={email} onChange={setEmail} placeholder="you@email.com"/>
        <Inp label="Password" value={password} onChange={setPassword} placeholder="Choose a strong password" pw/>
        <ErrBox msg={err}/>
        <PBtn onClick={authUser} disabled={loading} full>{loading?<><Spinner/>{isSignup?"Creating account…":"Signing in…"}</>:isSignup?"Create Account →":"Sign In →"}</PBtn>
        <div style={{textAlign:"center",marginTop:"14px"}}>
          <button onClick={()=>{setIsSignup(!isSignup);setErr("");}} style={{background:"none",border:"none",color:"#4a4a6a",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>
            {isSignup?"Already have an account? Sign in":"Don't have an account? Sign up"}
          </button>
        </div>
      </div>)}

      {step===3&&(<div>
        <div style={{fontSize:"15px",color:"#c7d2fe",fontWeight:600,marginBottom:"6px"}}>Step 3 of 3 — Add your AI key</div>
        <p style={{fontSize:"13px",color:"#4a4a6a",marginBottom:"20px",lineHeight:1.7}}>Powers the JD Analysis and Interview Coach features.</p>
        <div style={{background:"#0a0a14",borderRadius:"10px",padding:"16px",marginBottom:"20px",fontSize:"13px",color:"#64748b",lineHeight:1.8}}>
          <div style={{fontWeight:700,color:"#94a3b8",marginBottom:"6px"}}>Get your Anthropic API key:</div>
          <div>1. Go to <strong style={{color:"#a5b4fc"}}>console.anthropic.com</strong></div>
          <div>2. Click <strong style={{color:"#a5b4fc"}}>API Keys → Create Key</strong></div>
          <div>3. Copy and paste below</div>
          <div style={{marginTop:"8px",fontSize:"12px",color:"#4a4a6a"}}>💡 The $5 credit lasts months for personal use</div>
        </div>
        <Inp label="Anthropic API Key" value={apiKey} onChange={setApiKey} placeholder="sk-ant-..." pw/>
        <ErrBox msg={err}/>
        <PBtn onClick={saveApiKeyStep} disabled={loading||!apiKey} full>{loading?<><Spinner/>Testing…</>:"Save & Launch →"}</PBtn>
        <div style={{textAlign:"center",marginTop:"12px"}}>
          <button onClick={onDone} style={{background:"none",border:"none",color:"#4a4a6a",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>Skip AI features for now</button>
        </div>
      </div>)}
    </div>
  </div>);
}

/* ══════════════════════════════════════════════════════
   JD ANALYSIS
══════════════════════════════════════════════════════ */
function JDAnalysis({form,onSave}){
  const [loading,setLoading]=useState(false);
  const [analysis,setAnalysis]=useState(form.jdAnalysis||null);
  const [err,setErr]=useState("");
  async function analyze(){
    if(!form.jdText){setErr("Paste the job description in the Documents tab first.");return;}
    setLoading(true);setErr("");
    try{
      const txt=await callClaude([{role:"user",content:`Analyze this job description:\n\n${form.jdText.slice(0,3000)}\n\nReturn ONLY valid JSON (no markdown) with keys:\n- skills: array of 5 must-have skill strings\n- responsibilities: array of 5 key responsibility strings\n- signals: array of 3 culture/hidden priority strings\n- seniority: one of Junior/Mid/Senior/Lead\n- summary: one sentence of what they really want`}],"You are a career coach. Return only valid JSON, no markdown backticks, no preamble.");
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setAnalysis(parsed);onSave(parsed);
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  if(!form.jdText) return(<div style={{textAlign:"center",padding:"48px 0",color:"#2a2a4a"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>📄</div><div style={{fontSize:"14px"}}>Paste the job description in the <strong style={{color:"#6366f1"}}>Documents</strong> tab first.</div></div>);
  return(<div>{!analysis?(<div style={{textAlign:"center",padding:"32px 0"}}><ErrBox msg={err}/><div style={{fontSize:"14px",color:"#64748b",marginBottom:"20px"}}>Let AI break down what this role really needs.</div><PBtn onClick={analyze} disabled={loading}>{loading?<><Spinner/>Analysing…</>:"🔍 Analyse Job Description"}</PBtn></div>):(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
      <div><span style={{fontSize:"13px",color:"#4a4a6a"}}>Seniority: </span><Pill color="#06b6d4">{analysis.seniority}</Pill></div>
      <GBtn small onClick={()=>{setAnalysis(null);onSave(null);}}>Re-analyse</GBtn>
    </div>
    <div style={{background:"#0d0d1a",border:"1px solid #6366f133",borderRadius:"10px",padding:"14px 18px",marginBottom:"16px",fontSize:"14px",color:"#c7d2fe",fontStyle:"italic"}}>💡 {analysis.summary}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
      <Card><div style={{fontSize:"11px",color:"#6366f1",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Must-Have Skills</div>{(analysis.skills||[]).map((sk,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"7px",fontSize:"13px",color:"#e2e8f0"}}><span style={{color:"#6366f1",flexShrink:0}}>▸</span>{sk}</div>)}</Card>
      <Card><div style={{fontSize:"11px",color:"#10b981",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Key Responsibilities</div>{(analysis.responsibilities||[]).map((r,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"7px",fontSize:"13px",color:"#e2e8f0"}}><span style={{color:"#10b981",flexShrink:0}}>▸</span>{r}</div>)}</Card>
    </div>
    <Card><div style={{fontSize:"11px",color:"#f59e0b",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Culture Signals</div>{(analysis.signals||[]).map((sig,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"7px",fontSize:"13px",color:"#e2e8f0"}}><span style={{color:"#f59e0b",flexShrink:0}}>🔍</span>{sig}</div>)}</Card>
  </div>)}</div>);
}

/* ══════════════════════════════════════════════════════
   INTERVIEW COACH
══════════════════════════════════════════════════════ */
function InterviewCoach({form}){
  const [sub,setSub]=useState("Tips");
  const [tips,setTips]=useState(null);
  const [tLoading,setTLoading]=useState(false);
  const [tErr,setTErr]=useState("");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [cLoading,setCLoading]=useState(false);
  const [curQ,setCurQ]=useState(null);
  const [voiceMode,setVoiceMode]=useState(false);
  const [listening,setListening]=useState(false);
  const [speaking,setSpeaking]=useState(false);
  const [voiceErr,setVoiceErr]=useState("");
  const chatEnd=useRef(null);
  const recogRef=useRef(null);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const stage=form.stage||"Applied";

  /* ── Text-to-speech ── */
  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean=text.replace(/<[^>]+>/g,"").replace(/\*\*(.*?)\*\*/g,"$1");
    const utt=new SpeechSynthesisUtterance(clean);
    utt.rate=0.95;utt.pitch=1;utt.volume=1;
    utt.onstart=()=>setSpeaking(true);
    utt.onend=()=>setSpeaking(false);
    utt.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
  }
  function stopSpeaking(){
    window.speechSynthesis?.cancel();
    setSpeaking(false);
  }

  /* ── Speech-to-text ── */
  function toggleMic(){
    setVoiceErr("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setVoiceErr("Speech recognition not supported. Use Chrome or Edge.");return;}
    if(listening){
      recogRef.current?.stop();
      setListening(false);
      return;
    }
    const recog=new SR();
    recog.continuous=true;
    recog.interimResults=true;
    recog.lang="en-US";
    recog.onstart=()=>setListening(true);
    recog.onend=()=>setListening(false);
    recog.onerror=e=>{setListening(false);if(e.error!=="aborted")setVoiceErr("Mic error: "+e.error);};
    recog.onresult=e=>{
      let final="",interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      if(final) setInput(p=>(p+" "+final).trim());
    };
    recogRef.current=recog;
    recog.start();
  }

  async function genTips(){
    setTLoading(true);setTErr("");
    const jd=form.jdText?`JOB DESCRIPTION:\n${form.jdText.slice(0,2000)}`:"No job description provided.";
    const resume=form.resumeText?`MY RESUME:\n${form.resumeText.slice(0,1500)}`:"No resume uploaded.";
    const notes=form.notes?`MY NOTES:\n${form.notes}`:"";
    const comp=form.totalCompNotes?`Compensation context: ${form.totalCompNotes}`:"";
    const an=form.jdAnalysis?`Key skills identified: ${form.jdAnalysis.skills?.join(", ")}.`:"";
    const samples=form.workSamples?`MY WORK SAMPLES & ACHIEVEMENTS:\n${form.workSamples.slice(0,1500)}`:"";
    try{
      const txt=await callClaude([{role:"user",content:`I have a ${stage} interview for "${form.role}" at "${form.company}".\n\n${jd}\n\n${resume}\n\n${samples}\n\n${notes}\n${comp}\n${an}\n\nUsing my resume, work samples and the job description, give me highly personalised advice:\n1. 5 preparation tips tailored to MY background vs what THEY need — referencing specific achievements from my work samples where relevant\n2. 5 questions I should expect at this stage, with why — referencing specifics from the JD\n3. 3 smart questions I should ask them\n\nReturn ONLY valid JSON (no markdown) with keys: tips (string[]), expectedQuestions ({question,why}[]), questionsToAsk (string[])`}],"You are an expert interview coach. Tailor all advice to the candidate's specific resume and the job description. Return only valid JSON, no markdown.");
      setTips(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setTErr(e.message||"Something went wrong. Please try again.");}
    setTLoading(false);
  }

  function startPractice(q){
    setCurQ(q);setSub("Practice");stopSpeaking();
    const intro=`Let's practise! Here's your question:\n\n**"${q}"**\n\nAnswer as you would in the real interview — I'll give you detailed feedback.`;
    setMsgs([{role:"assistant",content:intro}]);
    if(voiceMode) setTimeout(()=>speak(`Here is your question: ${q}`),300);
  }

  async function send(){
    const msg=(input||"").trim();
    if(!msg||cLoading) return;
    setInput("");
    if(listening){recogRef.current?.stop();setListening(false);}
    stopSpeaking();
    const next=[...msgs,{role:"user",content:msg}];
    setMsgs(next);setCLoading(true);
    const resume=form.resumeText?`Candidate resume:\n${form.resumeText.slice(0,1000)}`:"No resume provided.";
    const jdCtx=form.jdText?`Job description:\n${form.jdText.slice(0,800)}`:"";
    const notesCtx=form.notes?`Candidate notes: ${form.notes}`:"";
    const samplesCtx=form.workSamples?`Candidate work samples & achievements:\n${form.workSamples.slice(0,1000)}`:"";
    const sys=`You are an expert interview coach helping someone practise for a ${stage} interview for "${form.role}" at "${form.company}".\n\n${resume}\n${samplesCtx}\n${jdCtx}\n${notesCtx}\n\nPractice question: "${curQ||"general"}".\n\nWhen giving feedback: reference specific achievements from their work samples to suggest how they could strengthen their answer. Give 1 genuine strength, 1-2 specific improvements, a stronger sample answer that incorporates their real experience, and a rating (Needs Work/Good/Excellent). Ask if they want to retry or move on. Use **bold** for key points.`;
    let finalTxt="";
    try{
      await callClaude(next.map(m=>({role:m.role,content:m.content})),sys,txt=>{finalTxt=txt;setMsgs([...next,{role:"assistant",content:txt}]);});
      if(voiceMode&&finalTxt) speak(finalTxt);
    }catch(e){setMsgs([...next,{role:"assistant",content:"⚠️ Error: "+e.message}]);}
    setCLoading(false);
  }

  function md(txt){return txt.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");}

  return(<div>
    <TabBar tabs={["Tips","Practice"]} active={sub} onSelect={setSub} small/>
    {sub==="Tips"&&(<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div style={{fontSize:"13px",color:"#64748b"}}>Stage: <Pill color={STAGE_CLR[stage]}>{stage}</Pill></div>
        <PBtn small onClick={()=>{setTErr("");genTips();}} disabled={tLoading}>{tLoading?<><Spinner/>Generating…</>:tips?"↻ Refresh":"✨ Generate Tips"}</PBtn>
      </div>
      <ErrBox msg={tErr}/>
      {!tips&&!tLoading&&!tErr&&(<div style={{textAlign:"center",padding:"32px 0",color:"#2a2a4a"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>🎯</div><div style={{fontSize:"14px"}}>Generate personalised tips for your {stage} interview.</div></div>)}
      {tips&&(<div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
        <Card><div style={{fontSize:"11px",color:"#6366f1",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Preparation Tips</div>{tips.tips.map((t,i)=><div key={i} style={{display:"flex",gap:"10px",marginBottom:"8px",fontSize:"13px",color:"#e2e8f0"}}><span style={{background:"#6366f122",color:"#a5b4fc",borderRadius:"4px",padding:"1px 6px",fontSize:"11px",fontWeight:700,flexShrink:0}}>{i+1}</span>{t}</div>)}</Card>
        <Card><div style={{fontSize:"11px",color:"#10b981",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Expected Questions — click to practise</div>{tips.expectedQuestions.map((q,i)=><div key={i} style={{marginBottom:"10px",background:"#0d0d1a",borderRadius:"8px",padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"}}><div><div style={{fontSize:"13px",color:"#e2e8f0",marginBottom:"4px",fontWeight:500}}>"{q.question}"</div><div style={{fontSize:"12px",color:"#4a4a6a"}}>Why: {q.why}</div></div><button onClick={()=>startPractice(q.question)} style={{background:"#6366f122",border:"1px solid #6366f144",color:"#a5b4fc",borderRadius:"6px",padding:"5px 10px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>Practise →</button></div></div>)}</Card>
        <Card><div style={{fontSize:"11px",color:"#f59e0b",fontWeight:700,marginBottom:"10px",letterSpacing:"0.06em",textTransform:"uppercase"}}>Ask Them</div>{tips.questionsToAsk.map((q,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"7px",fontSize:"13px",color:"#e2e8f0"}}><span style={{color:"#f59e0b",flexShrink:0}}>→</span>{q}</div>)}</Card>
      </div>)}
    </div>)}
    {sub==="Practice"&&(<div style={{display:"flex",flexDirection:"column",height:"460px"}}>
      {/* Voice mode toggle bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px",background:"#0a0a14",borderRadius:"8px",padding:"8px 14px"}}>
        <div style={{fontSize:"12px",color:"#64748b"}}>
          {speaking&&<span style={{color:"#10b981",marginRight:"8px"}}>🔊 Speaking…</span>}
          {listening&&<span style={{color:"#f43f5e",marginRight:"8px"}}>🎤 Listening…</span>}
          {!speaking&&!listening&&<span>Voice mode {voiceMode?"on":"off"}</span>}
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          {speaking&&<button onClick={stopSpeaking} style={{background:"none",border:"1px solid #f43f5e44",color:"#f43f5e",borderRadius:"6px",padding:"3px 10px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>⏹ Stop</button>}
          <button onClick={()=>{setVoiceMode(v=>!v);stopSpeaking();if(listening){recogRef.current?.stop();setListening(false);}}} style={{background:voiceMode?"#6366f122":"#0d0d1a",border:voiceMode?"1px solid #6366f155":"1px solid #2a2a3d",color:voiceMode?"#a5b4fc":"#4a4a6a",borderRadius:"6px",padding:"4px 12px",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
            {voiceMode?"🔊 Voice ON":"🔇 Voice OFF"}
          </button>
        </div>
      </div>
      {voiceErr&&<div style={{color:"#f59e0b",fontSize:"12px",marginBottom:"8px",padding:"6px 10px",background:"#f59e0b11",borderRadius:"6px"}}>⚠️ {voiceErr}</div>}
      {msgs.length===0?(<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#2a2a4a",gap:"12px"}}><div style={{fontSize:"36px"}}>💬</div><div style={{fontSize:"14px",textAlign:"center"}}>Go to <strong style={{color:"#6366f1"}}>Tips</strong> and click <strong style={{color:"#6366f1"}}>Practise →</strong> on any question.</div></div>):(<>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"8px"}}>
          {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:"6px"}}>
            <div style={{maxWidth:"82%",background:m.role==="user"?"#6366f122":"#0d0d1a",border:`1px solid ${m.role==="user"?"#6366f133":"#1a1a2e"}`,borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"10px 14px",fontSize:"13px",color:"#e2e8f0",lineHeight:1.65}} dangerouslySetInnerHTML={{__html:md(m.content)}}/>
            {m.role==="assistant"&&<button onClick={()=>speak(m.content)} title="Read aloud" style={{background:"none",border:"none",color:"#2a2a4a",cursor:"pointer",fontSize:"14px",padding:"4px",flexShrink:0}}>🔊</button>}
          </div>)}
          {cLoading&&<div style={{display:"flex"}}><div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:"12px 12px 12px 2px",padding:"10px 14px",fontSize:"13px",color:"#4a4a6a"}}><Spinner/>Analysing your answer…</div></div>}
          <div ref={chatEnd}/>
        </div>
        <div style={{display:"flex",gap:"8px",marginTop:"8px",alignItems:"flex-end"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder={listening?"Listening… speak your answer":"Type your answer… (Enter to send)"} rows={3} style={{flex:1,...si,resize:"none",borderColor:listening?"#f43f5e":undefined}}/>
          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            <button onClick={toggleMic} title={listening?"Stop recording":"Start recording"} style={{background:listening?"linear-gradient(135deg,#f43f5e,#e11d48)":"#0d0d1a",border:listening?"none":"1px solid #2a2a3d",color:listening?"#fff":"#64748b",borderRadius:"8px",padding:"10px 14px",cursor:"pointer",fontSize:"16px",boxShadow:listening?"0 4px 16px rgba(244,63,94,0.4)":"none",transition:"all 0.2s"}}>🎤</button>
            <button onClick={send} disabled={cLoading||!input.trim()} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 14px",cursor:"pointer",fontSize:"16px",opacity:cLoading||!input.trim()?0.5:1}}>↑</button>
          </div>
        </div>
      </>)}
    </div>)}
  </div>);
}

   APP DETAIL MODAL

function AppDetail({app,onClose,onSave,onDelete}){
  const [form,setForm]=useState({...app});
  const [dt,setDt]=useState("Overview");
  const [saved,setSaved]=useState(false);
  const f=field=>v=>setForm(p=>({...p,[field]:v}));
  function changeStage(newStage){
    if(newStage===form.stage) return;
    const today=new Date().toISOString().slice(0,10);
    setForm(p=>({...p,stage:newStage,stageDates:{...(p.stageDates||{}),[newStage]:today},history:[...(p.history||[]),{stage:newStage,status:p.status,date:today,notes:""}]}));
  }
  function save(){onSave(form);setSaved(true);setTimeout(()=>setSaved(false),1500);}
  const stageIdx=PIPELINE.indexOf(form.stage||"Applied");
  return(<Modal title={`${form.role} @ ${form.company}`} onClose={onClose} xl>
    <TabBar tabs={["Overview","Documents","JD Analysis","Interview Coach","History"]} active={dt} onSelect={setDt} small/>
    {dt==="Overview"&&(<div>
      <Card style={{marginBottom:"18px"}}>
        <Lbl c="Pipeline — click a stage to advance"/>
        <PipeBar stage={form.stage||"Applied"} onClick={changeStage}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>
          {PIPELINE.map((s,i)=><div key={s} style={{flex:1,textAlign:i===0?"left":i===4?"right":"center"}}>
            <button onClick={()=>changeStage(s)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:"10px",color:i<=stageIdx?STAGE_CLR[s]:"#2a2a4a",padding:"2px 0"}}>{s}</button>
            {form.stageDates?.[s]&&<div style={{fontSize:"9px",color:"#4a4a6a"}}>{form.stageDates[s]}</div>}
          </div>)}
        </div>
        <div style={{marginTop:"12px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
          <Lbl c={`Date for: ${form.stage}`}/>
          <input type="date" value={form.stageDates?.[form.stage]||""} onChange={e=>setForm(p=>({...p,stageDates:{...(p.stageDates||{}),[form.stage]:e.target.value}}))} style={{...si,width:"auto",padding:"7px 12px",fontSize:"13px"}}/>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
        <Inp label="Company" value={form.company} onChange={f("company")}/>
        <Inp label="Role" value={form.role} onChange={f("role")}/>
        <MonthPicker month={form.month} year={form.year} onChange={({month,year})=>setForm(p=>({...p,month,year}))}/>
        <div style={{marginBottom:"14px"}}><Lbl c="Status"/><select value={form.status||"Active"} onChange={e=>setForm(p=>({...p,status:e.target.value}))} style={{...si,color:STATUS_CLR[form.status]||"#e2e8f0"}}>{STATUSES.map(st=><option key={st} value={st}>{st}</option>)}</select></div>
        <Inp label="Salary Range" value={form.salaryRange} onChange={f("salaryRange")} placeholder="e.g. $80k–$100k"/>
      </div>
      <IChips selected={form.interviewTypes||[]} onChange={v=>setForm(p=>({...p,interviewTypes:v}))}/>
      <TA label="Total Compensation Notes" value={form.totalCompNotes} onChange={f("totalCompNotes")} rows={2}/>
      <TA label="Overall Notes" value={form.notes} onChange={f("notes")} rows={3}/>
    </div>)}
    {dt==="Documents"&&(<div>
      <SHead>Job Description</SHead>
      <TA value={form.jdText} onChange={f("jdText")} placeholder="Paste the full job description here…" rows={7}/>
      <SHead>Uploaded Files</SHead>
      <FileUp label="Resume" fileName={form.resumeName} onFile={(n,t)=>setForm(p=>({...p,resumeName:n,resumeText:t}))} onClear={()=>setForm(p=>({...p,resumeName:"",resumeText:""}))}/>
      <FileUp label="Cover Letter" fileName={form.coverLetterName} onFile={(n,t)=>setForm(p=>({...p,coverLetterName:n,coverLetterText:t}))} onClear={()=>setForm(p=>({...p,coverLetterName:"",coverLetterText:""}))}/>
      <FileUp label="Portfolio" fileName={form.portfolioName} onFile={(n,t)=>setForm(p=>({...p,portfolioName:n,portfolioText:t}))} onClear={()=>setForm(p=>({...p,portfolioName:"",portfolioText:""}))}/>
      <SHead>Work Samples & Additional Context</SHead>
      <div style={{background:"#0a0a14",borderRadius:"8px",padding:"12px 14px",marginBottom:"10px",fontSize:"12px",color:"#4a4a6a",lineHeight:1.7}}>
        Paste descriptions of projects, achievements, case studies, or any work you want the Interview Coach to reference when giving you tips and practice feedback. The more detail, the more personalised the coaching.
      </div>
      <TA value={form.workSamples} onChange={f("workSamples")} placeholder="e.g. Led a team of 5 to redesign the checkout flow, reducing drop-off by 23%. Built an ML pipeline that processed 2M records daily. Managed a $500k marketing budget across 3 campaigns…" rows={8}/>
    </div>)}
    {dt==="JD Analysis"&&(<JDAnalysis form={form} onSave={a=>setForm(p=>({...p,jdAnalysis:a}))}/>)}
    {dt==="Interview Coach"&&(<InterviewCoach form={form}/>)}
    {dt==="History"&&(<div>
      <SHead>Application Timeline</SHead>
      {(!form.history||form.history.length===0)?(<div style={{color:"#2a2a4a",fontSize:"13px",padding:"20px 0"}}>No history yet — advance the stage to start logging.</div>):(
        <div style={{display:"flex",flexDirection:"column",gap:"10px",maxHeight:"280px",overflowY:"auto"}}>
          {[...form.history].reverse().map((h,i)=><div key={i} style={{background:"#0a0a14",border:"1px solid #1a1a2e",borderLeft:`3px solid ${STAGE_CLR[h.stage]||"#6366f1"}`,borderRadius:"10px",padding:"12px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}><Pill color={STAGE_CLR[h.stage]||"#6366f1"}>{h.stage}</Pill><span style={{fontSize:"12px",color:"#4a4a6a"}}>{h.date}</span></div>
            {h.status&&<div style={{fontSize:"12px",color:"#64748b"}}>Status: {h.status}</div>}
            {h.notes&&<div style={{fontSize:"13px",color:"#94a3b8",marginTop:"5px"}}>{h.notes}</div>}
          </div>)}
        </div>
      )}
      {form.jdText&&(<><SHead>Stored Job Description</SHead><div style={{background:"#0a0a14",border:"1px solid #1a1a2e",borderRadius:"10px",padding:"14px",maxHeight:"200px",overflowY:"auto",fontSize:"13px",color:"#64748b",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{form.jdText}</div></>)}
    </div>)}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"22px",borderTop:"1px solid #1a1a2e",paddingTop:"18px"}}>
      <button onClick={()=>onDelete(form.id)} style={{background:"none",border:"1px solid #f43f5e44",color:"#f43f5e",borderRadius:"8px",padding:"8px 16px",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
      <div style={{display:"flex",gap:"10px"}}>
        <GBtn onClick={onClose}>Close</GBtn>
        <PBtn onClick={save}>{saved?"Saved ✓":"Save Changes"}</PBtn>
      </div>
    </div>
  </Modal>);
}

/* ══════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════ */
function App(){
  const [ready,setReady]=useState(false);
  const [apps,setApps]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState("Applications");
  const [showAdd,setShowAdd]=useState(false);
  const [activeApp,setActiveApp]=useState(null);
  const [form,setForm]=useState({...BLANK_APP});
  const [user,setUser]=useState(null);
  const [syncing,setSyncing]=useState(false);

  // All hooks before any conditional returns
  useEffect(()=>{
    const cfg=getSupaConfig();
    if(cfg){
      initSupa(cfg.url,cfg.anonKey);
      const supa=getSupa();
      supa.auth.getSession().then(({data})=>{
        if(data.session){
          setUser(data.session.user);
          setReady(true);
        } else {
          setReady(false);
        }
      });
      supa.auth.onAuthStateChange((_,session)=>{
        setUser(session?.user||null);
        setReady(!!session?.user);
      });
    } else {
      setReady(false);
    }
  },[]);

  // Load apps from Supabase when user is ready
  useEffect(()=>{
    if(!ready||!user) return;
    loadApps();
  },[ready,user]);

  const iRate=apps.length===0?0:Math.round(apps.filter(a=>a.stage!=="Applied").length/apps.length*100);
  const oRate=apps.length===0?0:Math.round(apps.filter(a=>a.stage==="Offer"||a.status==="Offer Accepted").length/apps.length*100);
  const stageCounts=useMemo(()=>{const c={};PIPELINE.forEach(s=>{c[s]=0;});apps.forEach(a=>{c[a.stage]=(c[a.stage]||0)+1;});return PIPELINE.map(s=>({stage:s,count:c[s]}));},[apps]);
  const overtime=useMemo(()=>{const m={};apps.forEach(a=>{const k=(a.month&&a.year)?`${a.year}-${String(MONTHS.indexOf(a.month)+1).padStart(2,"0")}`:"?";if(!m[k])m[k]={month:k,applied:0,interviews:0};m[k].applied++;if(a.stage!=="Applied")m[k].interviews++;});return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month));},[apps]);

  async function loadApps(){
    const supa=getSupa();
    setSyncing(true);
    const{data,error}=await supa.from("applications").select("*").eq("user_id",user.id).order("created_at",{ascending:false});
    if(!error&&data){
      setApps(data.map(r=>({...r.data,id:r.id,_dbid:r.id})));
    }
    setLoaded(true);
    setSyncing(false);
  }

  async function saveAppToDB(app){
    const supa=getSupa();
    const{_dbid,...appData}=app;
    if(_dbid){
      await supa.from("applications").update({data:appData,updated_at:new Date().toISOString()}).eq("id",_dbid);
    } else {
      const{data,error}=await supa.from("applications").insert({user_id:user.id,data:appData,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}).select().single();
      if(!error&&data) return{...appData,id:data.id,_dbid:data.id};
    }
    return app;
  }

  async function deleteAppFromDB(dbid){
    const supa=getSupa();
    await supa.from("applications").delete().eq("id",dbid);
  }

  async function addApp(){
    if(!form.company||!form.role) return;
    const today=new Date().toISOString().slice(0,10);
    const newApp={...form,id:Date.now(),stageDates:{[form.stage]:today},history:[{stage:form.stage,status:form.status,date:today,notes:form.notes}]};
    const saved=await saveAppToDB(newApp);
    setApps(p=>[saved,...p]);
    setForm({...BLANK_APP});setShowAdd(false);
  }

  async function updateApp(updated){
    await saveAppToDB(updated);
    setApps(p=>p.map(a=>a._dbid===updated._dbid?updated:a));
    setActiveApp(updated);
  }

  async function deleteApp(id){
    const app=apps.find(a=>a.id===id||a._dbid===id);
    if(app?._dbid) await deleteAppFromDB(app._dbid);
    setApps(p=>p.filter(a=>a.id!==id&&a._dbid!==id));
    setActiveApp(null);
  }

  function handleSetupDone(){
    const cfg=getSupaConfig();
    if(cfg){
      const supa=getSupa()||initSupa(cfg.url,cfg.anonKey);
      supa.auth.getSession().then(({data})=>{
        if(data.session){setUser(data.session.user);setReady(true);}
      });
    }
  }

  // Conditional returns AFTER all hooks
  if(!ready) return <SetupScreen onDone={handleSetupDone}/>;
  if(!loaded) return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"12px"}}><Spinner/><div style={{color:"#4a4a6a",fontSize:"14px"}}>Loading your applications…</div></div>);

  return(<div style={{minHeight:"100vh"}}>
    {/* Header */}
    <div style={{borderBottom:"1px solid #1a1a2e",padding:"22px 40px 0",background:"linear-gradient(180deg,#0f0f1e,#0a0a14)"}}>
      <div style={{maxWidth:"1160px",margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px"}}>
          <h1 style={{margin:0,fontSize:"26px",fontFamily:"'Playfair Display',serif",background:"linear-gradient(135deg,#a5b4fc,#818cf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CareerTrack</h1>
          <span style={{color:"#4a4a6a",fontSize:"13px",flex:1}}>your job search command center</span>
          {syncing&&<span style={{fontSize:"12px",color:"#4a4a6a"}}><Spinner small/>Syncing…</span>}
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <span style={{fontSize:"12px",color:"#4a4a6a"}}>{user?.email}</span>
            <button onClick={async()=>{await getSupa().auth.signOut();setReady(false);setApps([]);setLoaded(false);}} style={{background:"none",border:"1px solid #2a2a3d",color:"#4a4a6a",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Sign out</button>
            <button onClick={()=>{if(window.confirm("Reset API key?")){localStorage.removeItem("ct_apikey");}}} style={{background:"none",border:"1px solid #2a2a3d",color:"#4a4a6a",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>⚙ API Key</button>
          </div>
        </div>
        <TabBar tabs={["Applications","Insights"]} active={tab} onSelect={setTab}/>
      </div>
    </div>

    <div style={{maxWidth:"1160px",margin:"0 auto",padding:"28px 40px"}}>

      {/* APPLICATIONS */}
      {tab==="Applications"&&(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
          <div><div style={{fontSize:"20px",fontFamily:"'Playfair Display',serif",color:"#c7d2fe"}}>Job Applications</div><div style={{fontSize:"13px",color:"#4a4a6a",marginTop:"2px"}}>{apps.length} tracked · {apps.filter(a=>a.stage!=="Applied").length} progressed</div></div>
          <PBtn onClick={()=>setShowAdd(true)}>+ Add Application</PBtn>
        </div>
        {apps.length===0?(<div style={{textAlign:"center",padding:"80px 0",color:"#2a2a4a"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>📋</div><div>No applications yet. Add your first one!</div></div>):(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {apps.map(a=>(<div key={a.id||a._dbid} onClick={()=>setActiveApp(a)} style={{background:"#0f0f1e",border:"1px solid #1a1a2e",borderRadius:"12px",padding:"16px 20px",cursor:"pointer",transition:"border-color 0.2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#2a2a4d"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1a1a2e"}>
              <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:"15px"}}>{a.role}</div><div style={{fontSize:"13px",color:"#64748b",marginTop:"2px"}}>{a.company}{a.month?` · ${a.month} ${a.year||""}`:""}</div></div>
                <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                  {a.salaryRange&&<Pill color="#f59e0b">💰 {a.salaryRange}</Pill>}
                  <Pill color={STATUS_CLR[a.status]||"#6366f1"}>{a.status||"Active"}</Pill>
                </div>
              </div>
              <PipeBar stage={a.stage||"Applied"}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:"2px"}}>
                {PIPELINE.map((st,i)=><div key={st} style={{fontSize:"9px",flex:1,color:i<=PIPELINE.indexOf(a.stage||"Applied")?STAGE_CLR[st]:"#2a2a4a",textAlign:i===0?"left":i===4?"right":"center"}}>{st}</div>)}
              </div>
              {(a.interviewTypes||[]).length>0&&<div style={{marginTop:"8px",display:"flex",flexWrap:"wrap",gap:"5px"}}>{a.interviewTypes.map(t=><span key={t} style={{background:"#1a1a2e",color:"#818cf8",border:"1px solid #2a2a4d",borderRadius:"5px",padding:"1px 7px",fontSize:"11px"}}>🎤 {t}</span>)}</div>}
            </div>))}
          </div>
        )}
      </div>)}

      {/* INSIGHTS */}
      {tab==="Insights"&&(<div>
        <div style={{fontSize:"20px",fontFamily:"'Playfair Display',serif",color:"#c7d2fe",marginBottom:"22px"}}>Insights & Analytics</div>
        {apps.length===0?(<div style={{textAlign:"center",padding:"80px 0",color:"#2a2a4a"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>📊</div><div>Add applications to see insights.</div></div>):(<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"14px",marginBottom:"24px"}}>
            {[{label:"Total Applied",value:apps.length,color:"#6366f1"},{label:"Interview Rate",value:iRate+"%",color:"#10b981"},{label:"Offer Rate",value:oRate+"%",color:"#f59e0b"}].map(st=><Card key={st.label} style={{textAlign:"center"}}><div style={{fontSize:"30px",fontWeight:700,color:st.color,fontFamily:"'Playfair Display',serif"}}>{st.value}</div><div style={{fontSize:"11px",color:"#4a4a6a",marginTop:"4px",letterSpacing:"0.06em",textTransform:"uppercase"}}>{st.label}</div></Card>)}
          </div>
          <Card style={{marginBottom:"20px"}}>
            <div style={{fontSize:"14px",color:"#94a3b8",marginBottom:"16px",fontWeight:600}}>Pipeline Funnel</div>
            <div style={{display:"flex",gap:"10px",justifyContent:"space-around",flexWrap:"wrap"}}>
              {stageCounts.map(sc=><div key={sc.stage} style={{textAlign:"center",padding:"14px 18px",background:"#0a0a14",borderRadius:"10px",border:`1px solid ${STAGE_CLR[sc.stage]}33`,minWidth:"90px"}}>
                <div style={{fontSize:"28px",fontWeight:700,color:STAGE_CLR[sc.stage],fontFamily:"'Playfair Display',serif"}}>{sc.count}</div>
                <div style={{fontSize:"11px",color:"#4a4a6a",marginTop:"4px"}}>{sc.stage}</div>
              </div>)}
            </div>
          </Card>
          <Card>
            <div style={{fontSize:"14px",color:"#94a3b8",marginBottom:"16px",fontWeight:600}}>Applications by Month</div>
            {overtime.length===0?<div style={{color:"#2a2a4a",fontSize:"13px",padding:"20px 0",textAlign:"center"}}>Add applications with a month to see trends.</div>:(
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {overtime.map(m=>{const max=Math.max(...overtime.map(x=>x.applied));return(<div key={m.month} style={{display:"flex",alignItems:"center",gap:"12px"}}>
                  <div style={{fontSize:"12px",color:"#64748b",width:"80px",flexShrink:0}}>{m.month}</div>
                  <div style={{flex:1,background:"#0a0a14",borderRadius:"4px",height:"22px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round(m.applied/max*100)}%`,background:"#6366f1",borderRadius:"4px",display:"flex",alignItems:"center",paddingLeft:"8px",minWidth:"60px"}}>
                      <span style={{fontSize:"11px",color:"#fff",fontWeight:600,whiteSpace:"nowrap"}}>{m.applied} applied</span>
                    </div>
                  </div>
                  <div style={{fontSize:"12px",color:"#10b981",width:"90px",flexShrink:0,textAlign:"right"}}>{m.interviews} progressed</div>
                </div>);})}
              </div>
            )}
          </Card>
        </>)}
      </div>)}
    </div>

    {/* ADD APP MODAL */}
    {showAdd&&(<Modal title="New Application" onClose={()=>setShowAdd(false)} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
        <Inp label="Company" value={form.company} onChange={v=>setForm(p=>({...p,company:v}))} placeholder="e.g. Acme Corp"/>
        <Inp label="Role" value={form.role} onChange={v=>setForm(p=>({...p,role:v}))} placeholder="e.g. Product Manager"/>
        <MonthPicker month={form.month} year={form.year} onChange={({month,year})=>setForm(p=>({...p,month,year}))}/>
        <Sel label="Pipeline Stage" value={form.stage} onChange={v=>setForm(p=>({...p,stage:v}))} options={PIPELINE}/>
        <Sel label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={STATUSES}/>
        <Inp label="Salary Range" value={form.salaryRange} onChange={v=>setForm(p=>({...p,salaryRange:v}))} placeholder="e.g. $80k–$100k"/>
      </div>
      <IChips selected={form.interviewTypes||[]} onChange={v=>setForm(p=>({...p,interviewTypes:v}))}/>
      <TA label="Job Description" value={form.jdText} onChange={v=>setForm(p=>({...p,jdText:v}))} placeholder="Paste full job description…" rows={4}/>
      <TA label="Total Compensation Notes" value={form.totalCompNotes} onChange={v=>setForm(p=>({...p,totalCompNotes:v}))} rows={2}/>
      <TA label="Overall Notes" value={form.notes} onChange={v=>setForm(p=>({...p,notes:v}))} rows={2}/>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"10px",marginTop:"8px"}}>
        <GBtn onClick={()=>setShowAdd(false)}>Cancel</GBtn>
        <PBtn onClick={addApp}>Save Application</PBtn>
      </div>
    </Modal>)}

    {activeApp&&<AppDetail app={activeApp} onClose={()=>setActiveApp(null)} onSave={updateApp} onDelete={deleteApp}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
